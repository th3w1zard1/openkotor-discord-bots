# Fly.io: deploy from this directory after `fly launch` (set unique app name).
# https://fly.io/docs/reference/configuration/
app = "openkotor-matchmaking-inducer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  INDUCER_PROVIDER = "fly"
  INDUCER_REGION = "iad"
  # Set secret: fly secrets set MATCHMAKING_UPSTREAM_URL=https://YOUR.worker.dev

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
